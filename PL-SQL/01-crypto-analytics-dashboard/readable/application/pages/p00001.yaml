- # ====== Region: Historial de Precios (30 días) ==============
  id: 152843847470062406101
  identification: 
    name: Historial de Precios (30 días)
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT fecha_registro as "Fecha", 
             '$' || TO_CHAR(precio_usd, '99G999D00') as "Precio", 
             ROUND(volumen_24h/1000000, 2) || 'M' as "Volumen (Millones)"
      FROM CRYPTO_DASHBOARD 
      ORDER BY fecha_registro DESC

  order-by: 
    type: None

  layout: 
